<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסת עובדים</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>

<body class="bg-light-green">
    <main class="min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-5">
                    <div class="card card-soft-light shadow-lg border-0 overflow-hidden">
                        <div class="card-body p-4 p-md-5">
                            <div class="mb-4 text-center">
                                <p class="text-uppercase text-secondary-light mb-2 small">מערכת ניהול עובדים</p>
                                <h1 class="h3 mb-2">כניסה למערכת</h1>
                                <p class="text-muted mb-0">הכנס את פרטי המשתמש כדי להתחבר.</p>
                            </div>

                            <form>
                                <div class="mb-3">
                                    <label for="loginUsername" class="form-label">שם משתמש</label>
                                    <input type="text" class="form-control form-control-light" id="loginUsername" placeholder="הזן שם משתמש" required>
                                </div>

                                <div class="mb-4">
                                    <label for="loginPassword" class="form-label">סיסמה</label>
                                    <input type="password" class="form-control form-control-light" id="loginPassword" placeholder="הזן סיסמה" required>
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-light-green btn-lg">התחבר</button>
                                </div>

                                <div class="text-center">
                                    <p class="mb-0">אין לך חשבון? <a href="RegistrationForm.html" class="badge badge-light-green text-decoration-none">הרשם כאן</a></p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
